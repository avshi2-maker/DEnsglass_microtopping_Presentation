<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DensGlass® + Baxab-Eco® — Facade Renewal System</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1a1a2e;--teal:#0d5c63;--teal2:#0a4550;
  --gold:#c9933a;--gold2:#e8b84c;
  --cream:#fdf6e3;--lgray:#f0ebe0;
  --green:#2d9e6b;--red:#dc2626;--navy:#101a30;
  --white:#ffffff;--mgray:#8b8b8b;
}
body{font-family:'Heebo',sans-serif;background:#111;color:#fff;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(10,10,20,0.95);
    backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,147,58,0.3);
    padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.nav-title{font-size:13px;font-weight:900;color:var(--gold);margin-right:16px}
.nav-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
         color:#ccc;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;
         font-family:'Heebo',sans-serif;transition:all 0.2s}
.nav-btn:hover,.nav-btn.active{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:700}
.nav-right{margin-left:auto;display:flex;gap:8px}
.print-btn{background:var(--teal);border:none;color:#fff;padding:6px 16px;
           border-radius:20px;cursor:pointer;font-size:11px;font-family:'Heebo',sans-serif;font-weight:700}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;
         align-items:center;justify-content:center;z-index:9999}
.spinner{width:48px;height:48px;border:4px solid rgba(201,147,58,0.2);
         border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--gold);font-size:14px;letter-spacing:2px}

/* MAIN */
main{padding-top:58px}

/* SLIDE BASE */
.slide{width:100%;min-height:100vh;padding:60px 48px 48px;
       display:none;animation:fadeIn 0.4s ease}
.slide.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* SLIDE HEADER */
.slide-header{margin-bottom:32px}
.slide-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;opacity:0.7}
.slide-header h1{font-size:42px;font-weight:900;line-height:1.1;margin-bottom:10px}
.slide-header p{font-size:15px;opacity:0.7;line-height:1.6}
.header-line{height:3px;width:80px;margin-top:16px;border-radius:2px}

/* HERO IMAGE */
.hero-img{width:100%;height:320px;object-fit:cover;border-radius:16px;
          margin-bottom:32px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}

/* GRID 3 */
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:24px}

/* ICON CARD */
.icon-card{border-radius:14px;padding:24px;transition:transform 0.2s,box-shadow 0.2s}
.icon-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.card-ico{font-size:32px;margin-bottom:14px}
.card-head{background:var(--teal);padding:14px 18px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:10px}
.card-head span{font-size:22px}
.card-head h3{font-size:14px;font-weight:900;color:#fff}
.card-body{background:#fff;padding:16px 18px;border-radius:0 0 10px 10px;
           font-size:12px;color:#333;line-height:1.8}

/* TWO COL */
.two-col{display:grid;grid-template-columns:340px 1fr;gap:32px;align-items:start}
.col-left{border-radius:16px;padding:32px;position:sticky;top:70px}
.col-right{}
.spec-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);align-items:flex-start}
.spec-key{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px;
          color:var(--gold);width:100px;flex-shrink:0;padding-top:3px}
.spec-val{font-size:11px;line-height:1.6}
.spec-highlight .spec-val{color:var(--gold2);font-weight:700}
.product-img{width:100%;height:200px;object-fit:cover;border-radius:10px;margin-bottom:20px}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:24px 0}
.stat-box{border-radius:10px;padding:16px;text-align:center}
.stat-n{font-size:26px;font-weight:900}
.stat-l{font-size:10px;margin-top:6px;opacity:0.7;line-height:1.4}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px;border-radius:10px;overflow:hidden}
.data-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700}
.data-table td{padding:9px 14px;border-bottom:1px solid rgba(0,0,0,0.06)}
.data-table tr:nth-child(even) td{background:rgba(0,0,0,0.03)}
.highlight-row td{font-weight:900}
.pass{font-weight:700;color:var(--green)}
.two-tables{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.table-title{font-size:14px;font-weight:900;margin-bottom:12px}

/* CERT GRID */
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px}
.cert-item{border-radius:8px;padding:12px 14px}
.cert-item strong{font-size:11px;display:block;margin-bottom:4px}
.cert-item span{font-size:10px;opacity:0.7}
.cert-result{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:4px}

/* PRICE TABLE */
.price-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.price-table{width:100%;border-collapse:collapse;font-size:12px}
.price-table th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:#fff}
.price-table td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.06);color:#222}
.price-table tr:nth-child(even) td{background:rgba(13,92,99,0.03)}
.total-row td{font-weight:900;font-size:13px;color:#fff}
.blank{color:#aaa;font-style:italic}
.price-notes{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.pnote{border-radius:10px;padding:14px 16px}
.pnote strong{font-size:9px;display:block;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.pnote span{font-size:11px;line-height:1.6}

/* COVER SPECIAL */
.cover-wrap{display:grid;grid-template-columns:1fr 400px;gap:40px;align-items:center;min-height:85vh}
.cover-left{}
.cover-right{border-radius:20px;padding:32px;text-align:center}
.cover-title{font-size:58px;font-weight:900;line-height:1.05;margin-bottom:16px}
.cover-title span{color:var(--gold)}
.cover-sub{font-size:20px;letter-spacing:3px;color:var(--gold);margin-bottom:24px}
.cover-line{width:80px;height:3px;background:var(--gold);margin-bottom:24px}
.tag-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}
.tag{background:rgba(201,147,58,0.15);border:1px solid rgba(201,147,58,0.3);
     color:var(--gold);padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700}
.sys-box{border:1px solid rgba(201,147,58,0.3);border-radius:14px;padding:24px}
.sys-layer{background:rgba(255,255,255,0.06);border-radius:8px;padding:12px 16px;
           margin-bottom:8px;font-size:13px;font-weight:700}
.sys-plus{color:var(--gold);text-align:center;font-size:20px;margin:4px 0}
.sys-result{background:var(--gold);color:var(--dark);border-radius:8px;
            padding:12px 16px;font-size:12px;font-weight:900;margin-top:8px}

/* CONTACT */
.contact-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
              min-height:85vh;text-align:center}
.contact-wrap h1{font-size:44px;font-weight:900;margin-bottom:16px}
.contact-box{border:1px solid rgba(201,147,58,0.3);border-radius:16px;
             padding:32px 56px;margin-top:32px;display:inline-block}
.contact-name{font-size:20px;font-weight:900;margin-bottom:14px}
.contact-detail{font-size:15px;line-height:2.4;color:var(--gold)}

/* WEIGHT BAR */
.weight-bar{border:1px solid rgba(201,147,58,0.3);background:rgba(201,147,58,0.08);
            border-radius:8px;padding:12px 20px;text-align:center;
            font-size:12px;font-weight:700;color:var(--gold);margin-top:20px}

/* SURFACES */
.surface-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:24px}
.surface-card{border-radius:12px;overflow:hidden}
.surface-num{display:inline-block;width:28px;height:28px;border-radius:50%;
             font-size:12px;font-weight:900;text-align:center;line-height:28px;margin-bottom:10px}

/* EPD LINK */
.epd-bar{background:rgba(13,92,99,0.15);border:1px solid rgba(13,92,99,0.3);
         border-radius:8px;padding:12px 20px;margin-top:20px;display:flex;
         align-items:center;gap:12px;font-size:12px}
.epd-bar a{color:var(--gold);font-weight:700;text-decoration:none}
.epd-bar a:hover{text-decoration:underline}

@media(max-width:768px){
  .cover-wrap,.two-col,.two-tables,.price-notes{grid-template-columns:1fr}
  .slide{padding:60px 20px 32px}
  .cover-title{font-size:36px}
  .stats-row{grid-template-columns:1fr 1fr}
}
@media print{
  nav{display:none}
  .slide{display:block!important;page-break-after:always;min-height:100vh;padding:40px}
  main{padding-top:0}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>LOADING PRESENTATION...</p>
</div>

<nav id="nav">
  <span class="nav-title">DensGlass® + Baxab-Eco®</span>
  <div id="nav-buttons"></div>
  <div class="nav-right">
    <button class="print-btn" onclick="window.print()">🖨 Print / PDF</button>
  </div>
</nav>

<main id="main"></main>

<script>
const SUPA_URL = 'https://vqelnbvvbowchtvedntw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxZWxuYnZ2Ym93Y2h0dmVkbnR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzA5OTQsImV4cCI6MjA4ODA0Njk5NH0.SEoGh9L470qSxIUqmI-Uo-oyAGJol6RdrDpSGBp79DI';
const EPD_URL = 'https://vqelnbvvbowchtvedntw.supabase.co/storage/v1/object/public/facade-images/EPD-Densglass.pdf';

const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

let allSlides=[], allContent=[], allSpecs=[], allCerts=[], allPrice=[], offerMeta={};
let currentSlide = 0;

async function loadAll() {
  const [s,c,sp,ce,pr,om] = await Promise.all([
    db.from('presentation_slides').select('*').eq('is_active',true).order('slide_order'),
    db.from('slide_content').select('*').eq('is_active',true).order('block_order'),
    db.from('product_specs').select('*').order('spec_order'),
    db.from('certifications').select('*').order('cert_order'),
    db.from('price_offer').select('*').eq('is_active',true).order('item_order'),
    db.from('offer_meta').select('*').limit(1)
  ]);
  allSlides  = s.data  || [];
  allContent = c.data  || [];
  allSpecs   = sp.data || [];
  allCerts   = ce.data || [];
  allPrice   = pr.data || [];
  offerMeta  = om.data?.[0] || {};
}

function getContent(key){ return allContent.filter(x=>x.slide_key===key); }
function getSpecs(key)  { return allSpecs.filter(x=>x.product_key===key); }
function getCerts(key)  { return allCerts.filter(x=>x.product_key===key); }

// ── RENDERERS ─────────────────────────────────

function renderCover(sl){
  const items = getContent('cover');
  const bullets = items.filter(x=>x.block_type==='bullet');
  return `
  <div class="slide active" id="slide-0" style="background:${sl.bg_color};min-height:100vh;padding:70px 48px 48px">
    <div class="cover-wrap">
      <div class="cover-left">
        <div style="font-size:10px;letter-spacing:4px;color:var(--gold);margin-bottom:14px">FACADE RENEWAL SYSTEM · 2026</div>
        <div class="cover-title">DensGlass®<br><span>+ Baxab-Eco®</span></div>
        <div class="cover-sub">LIGHTWEIGHT FACADE RENEWAL</div>
        <div class="cover-line"></div>
        <p style="font-size:14px;color:#b0a890;line-height:1.8;max-width:520px">${sl.subtitle}</p>
        <div class="tag-row">
          ${bullets.map(b=>`<span class="tag">${b.icon} ${b.heading}</span>`).join('')}
        </div>
        ${sl.image_url?`<img src="${sl.image_url}" class="hero-img" style="margin-top:28px;height:220px" onerror="this.style.display='none'">` :''}
      </div>
      <div class="cover-right" style="background:var(--teal)">
        <div style="font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:20px">THE SYSTEM</div>
        <div class="sys-box">
          <div class="sys-layer">🔩 Aluminium Subframe</div>
          <div class="sys-plus">+</div>
          <div class="sys-layer">🟨 DensGlass® Sheathing</div>
          <div class="sys-plus">+</div>
          <div class="sys-layer">🪵 Baxab-Eco® Microtoping</div>
          <div class="sys-result">= Beautiful · Durable<br>Code-Compliant Facade</div>
        </div>
        <div style="margin-top:20px;font-size:11px;color:rgba(255,255,255,0.5)">${offerMeta.prepared_by||'Avshi Sapir'}</div>
      </div>
    </div>
  </div>`;
}

function renderGrid3(sl){
  const items = getContent(sl.slide_key);
  const isLight = sl.bg_color==='#fdf6e3';
  const cardBg  = isLight ? '' : 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)';
  const txtColor= isLight ? 'color:#1a1a2e' : 'color:#fff';
  const subColor= isLight ? 'color:#555' : 'color:var(--lgray)';
  return `
  <div class="slide" id="slide-${allSlides.indexOf(sl)}" style="background:${sl.bg_color};padding-top:70px">
    <div class="slide-header">
      <div class="slide-label" style="color:${sl.accent_color}">${sl.slide_key.toUpperCase()}</div>
      <h1 style="${txtColor}">${sl.title}</h1>
      <p style="${subColor}">${sl.subtitle||''}</p>
      <div class="header-line" style="background:${sl.accent_color}"></div>
    </div>
    ${sl.image_url?`<img src="${sl.image_url}" class="hero-img" onerror="this.style.display='none'">` :''}
    <div class="grid3">
      ${items.map(item=>`
        <div style="${cardBg};border-radius:14px;overflow:hidden">
          <div class="card-head" style="background:${sl.accent_color}">
            <span>${item.icon||''}</span>
            <h3>${item.heading||''}</h3>
          </div>
          <div class="card-body">${item.body_text||''}</div>
        </div>`).join('')}
    </div>
    ${sl.slide_key==='system'?`<div class="weight-bar">⚡ Total system weight ≈ 12-15 kg/m² &nbsp;·&nbsp; Traditional concrete facade: 80-120 kg/m² &nbsp;·&nbsp; Weight saving: ~85%</div>`:''}
    ${sl.slide_key==='challenge'?`<div style="background:${sl.accent_color};border-radius:10px;padding:12px 20px;margin-top:20px;font-size:12px;font-weight:700;color:#fff">✅ OUR SOLUTION: Aluminium subframe + DensGlass® fire-rated sheathing + Baxab-Eco® zero-VOC microtoping — lightweight, fire-safe, beautiful, fully compliant.</div>`:''}
  </div>`;
}

function renderTwoCol(sl){
  const isLight = sl.bg_color==='#fdf6e3';
  const txtColor= isLight?'color:#1a1a2e':'color:#fff';
  const subColor= isLight?'color:#555':'color:var(--lgray)';
  const specs   = getSpecs(sl.slide_key);
  const feats   = getContent(sl.slide_key);
  const colBg   = isLight?'background:var(--teal)':'background:#1c2438';
  const isGreen = sl.accent_color==='#2d9e6b';

  const statData = isGreen
    ? [['2-3mm','Thickness'],['0 VOC','Content'],['3×','Stronger'],['40+','Colors']]
    : [];

  return `
  <div class="slide" id="slide-${allSlides.indexOf(sl)}" style="background:${sl.bg_color};padding-top:70px">
    <div class="slide-header">
      <div class="slide-label" style="color:${sl.accent_color}">PRODUCT SHEET</div>
      <h1 style="${txtColor}">${sl.title}</h1>
      <p style="${subColor}">${sl.subtitle||''}</p>
      <div class="header-line" style="background:${sl.accent_color}"></div>
    </div>
    <div class="two-col">
      <div class="col-left" style="${colBg}">
        ${sl.image_url?`<img src="${sl.image_url}" class="product-img" onerror="this.style.display='none'">` :''}
        ${statData.length?`<div class="stats-row">${statData.map(([n,l])=>`
          <div class="stat-box" style="background:rgba(255,255,255,0.08)">
            <div class="stat-n" style="color:${sl.accent_color}">${n}</div>
            <div class="stat-l">${l}</div>
          </div>`).join('')}</div>`:''}
        ${specs.map(s=>`
          <div class="spec-row ${s.highlight?'spec-highlight':''}">
            <span class="spec-key">${s.spec_name}</span>
            <span class="spec-val">${s.spec_value}</span>
          </div>`).join('')}
        ${isGreen?`<div class="epd-bar">📄 <a href="${EPD_URL}" target="_blank">View EPD Datasheet (PDF)</a></div>`:''}
      </div>
      <div class="col-right">
        <h3 style="font-size:15px;font-weight:900;${txtColor};margin-bottom:16px">
          ${isGreen?'KEY ADVANTAGES FOR EXTERIOR FACADE':'WHY DENSGLASS FOR FACADE RENOVATION'}
        </h3>
        ${feats.map(f=>`
          <div style="display:flex;gap:14px;background:${isLight?'#fff':'rgba(255,255,255,0.04)'};
               border-radius:10px;padding:14px;margin-bottom:10px;
               border:1px solid rgba(0,0,0,0.06)">
            <span style="font-size:22px;flex-shrink:0;width:30px;text-align:center">${f.icon||''}</span>
            <div>
              <div style="font-size:12px;font-weight:900;color:${sl.accent_color};margin-bottom:4px">${f.heading||''}</div>
              <div style="font-size:11px;${isLight?'color:#444':'color:var(--lgray)'};line-height:1.7">${f.body_text||''}</div>
            </div>
          </div>`).join('')}
        ${!isGreen?`<div class="epd-bar" style="margin-top:12px">📄 <a href="${EPD_URL}" target="_blank">View EPD Datasheet — DensGlass® (PDF)</a></div>`:''}
      </div>
    </div>
  </div>`;
}

function renderFireTable(sl){
  const dgCerts = getCerts('densglass');
  const bxCerts = getCerts('baxab');
  return `
  <div class="slide" id="slide-${allSlides.indexOf(sl)}" style="background:${sl.bg_color};padding-top:70px">
    <div class="slide-header">
      <div class="slide-label" style="color:${sl.accent_color}">COMPLIANCE</div>
      <h1 style="color:#1a1a2e">${sl.title}</h1>
      <p style="color:#555">${sl.subtitle||''}</p>
      <div class="header-line" style="background:${sl.accent_color}"></div>
    </div>
    <div class="two-tables">
      <div>
        <div class="table-title" style="color:var(--teal)">DensGlass® — Fire & Safety Certifications</div>
        <div class="price-wrap">
          <table class="data-table">
            <tr><th style="background:var(--teal);color:#fff">Certificate</th>
                <th style="background:var(--teal);color:#fff">Result</th>
                <th style="background:var(--teal);color:#fff">Reference</th></tr>
            ${dgCerts.map(c=>`
              <tr class="${c.highlight?'highlight-row':''}">
                <td>${c.cert_name}</td>
                <td class="pass">${c.result}</td>
                <td style="font-size:10px;color:#777">${c.version||''}</td>
              </tr>`).join('')}
          </table>
        </div>
        <div class="epd-bar" style="margin-top:12px">📄 <a href="${EPD_URL}" target="_blank">DensGlass® EPD Datasheet (PDF)</a></div>
      </div>
      <div>
        <div class="table-title" style="color:var(--green)">Baxab-Eco® — VOC & Environmental Compliance</div>
        <div class="price-wrap">
          <table class="data-table">
            <tr><th style="background:var(--green);color:#fff">Regulation</th>
                <th style="background:var(--green);color:#fff">Result</th>
                <th style="background:var(--green);color:#fff">Version</th></tr>
            ${bxCerts.map(c=>`
              <tr class="${c.highlight?'highlight-row':''}">
                <td>${c.cert_name}</td>
                <td class="pass">${c.result}</td>
                <td style="font-size:10px;color:#777">${c.version||''}</td>
              </tr>`).join('')}
          </table>
        </div>
      </div>
    </div>
  </div>`;
}

function renderPriceTable(sl){
  return `
  <div class="slide" id="slide-${allSlides.indexOf(sl)}" style="background:${sl.bg_color};padding-top:70px">
    <div class="slide-header">
      <div class="slide-label" style="color:${sl.accent_color}">PRICE OFFER</div>
      <h1 style="color:#1a1a2e">${sl.title}</h1>
      <p style="color:#555">Client: ${offerMeta.client_name||'_______________'} &nbsp;|&nbsp; 
         Date: ${offerMeta.offer_date||'_______________'} &nbsp;|&nbsp;

    </div>
    <div class="price-wrap">
      <table class="price-table">
        <tr>
          <th style="background:var(--teal);width:35%">Description of Work</th>
          <th style="background:var(--teal);width:7%">Unit</th>
          <th style="background:var(--teal);width:10%">Qty</th>

      <div class="pnote" style="background:var(--teal)">

        <strong>WARRANTY</strong>
        <span>${offerMeta.warranty||'3-year Topcret guarantee'}</span>

        <span>${offerMeta.exclusions||'DensGlass supply, aluminium frame, VAT'}</span>

}

function renderSurfaces(sl){
  const items = getContent('surfaces');
  return `
  <div class="slide" id="slide-${allSlides.indexOf(sl)}" style="background:${sl.bg_color};padding-top:70px">
    <div class="slide-header">
      <div class="slide-label" style="color:${sl.accent_color}">TECHNICAL GUIDE</div>
      <h1 style="color:#1a1a2e">${sl.title}</h1>
      <p style="color:#555">${sl.subtitle||''}</p>
      <div class="header-line" style="background:${sl.accent_color}"></div>
    </div>
    <div class="surface-grid">
      ${items.map((item,i)=>`
        <div class="surface-card" style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:16px">
          <div class="surface-num" style="background:${sl.accent_color};color:#fff">${i+1}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">

          <p style="font-size:11px;color:#444;line-height:1.7">${item.body_text||''}</p>
        </div>`).join('')}
    </div>
    <div style="background:var(--teal);border-radius:10px;padding:12px 20px;margin-top:20px;font-size:12px;font-weight:700;color:#fff">
      ✅ DensGlass® is the ideal substrate for Baxab-Eco® microtoping — preferred by EIMA for all climate zones.
    </div>
  </div>`;
}

// ── MAIN RENDERER ────────────────────────────
function renderAll(){
  const main = document.getElementById('main');
  const nav  = document.getElementById('nav-buttons');
  let html = '';

  allSlides.forEach((sl,i)=>{
    if(sl.layout==='cover')        html += renderCover(sl);
    else if(sl.layout==='grid3')   html += (sl.slide_key==='surfaces'?renderSurfaces(sl):renderGrid3(sl));
    else if(sl.layout==='two-col') html += renderTwoCol(sl);
    else if(sl.layout==='table' && sl.slide_key==='fire') html += renderFireTable(sl);
    else if(sl.layout==='table' && sl.slide_key==='price') html += renderPriceTable(sl);
    else if(sl.layout==='contact') html += renderContact(sl);
    else                           html += renderGrid3(sl);
  });

  main.innerHTML = html;

  // Nav buttons
  nav.innerHTML = allSlides.map((sl,i)=>`
    <button class="nav-btn ${i===0?'active':''}" onclick="goTo(${i})">${sl.slide_order}. ${sl.title.replace('®','')}</button>
  `).join('');
}

function goTo(i){
  document.querySelectorAll('.slide').forEach((s,j)=>{
    s.classList.toggle('active', j===i);
  });
  document.querySelectorAll('.nav-btn').forEach((b,j)=>{
    b.classList.toggle('active', j===i);
  });
  currentSlide = i;
  window.scrollTo(0,0);
}

// keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(Math.min(currentSlide+1,allSlides.length-1));
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   goTo(Math.max(currentSlide-1,0));
});

// ── INIT ────────────────────────────────────
(async()=>{
  try{
    await loadAll();
    renderAll();
    document.getElementById('loading').style.display='none';
  }catch(e){
    document.getElementById('loading').innerHTML=`<p style="color:red">Error: ${e.message}</p>`;
    console.error(e);
  }
})();
</script>

</html>
